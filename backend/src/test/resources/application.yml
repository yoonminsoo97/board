spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
    username: sa
    password:
  h2:
    console:
      enabled: false
jwt:
  secret-key: test-test-secret-key-key-secret-test-test
  access-token:
    expire: 100000
  refresh-token:
    expire: 10000000